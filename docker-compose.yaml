volumes:
    go_build_cache:
    node_modules:
    mysql_data:

services:
    go:
        build:
            context: backend
            dockerfile: Dockerfile
        tty: true
        ports:
            - "8000:8000"
        env_file:
            - ./backend/.env
        volumes:
            - ./backend:/app
            - go_build_cache:/app/tmp
        working_dir: /app
        command: ["air"]
        depends_on:
            - db
            - redis
    web:
        build:
            context: frontend
            dockerfile: Dockerfile
        tty: true
        ports:
            - "8080:8080"
        volumes:
            - ./frontend:/app:cached
            - node_modules:/app/node_modules
        depends_on:
            - go
    db:
        build:
            context: db
            dockerfile: Dockerfile
        tty: true
        env_file:
            - ./db/.env
        volumes:
            - mysql_data:/var/lib/mysql
            - ./db/init:/docker-entrypoint-initdb.d
    redis:
        image: redis:alpine
